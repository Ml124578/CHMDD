<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML File</title>
    <!-- CSS部分 -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 1.2em;
            color: #666;
        }
    </style>
</head>
<body>

    <!-- HTML部分 -->
    <h1>欢迎来到我的网站</h1>
    <p>这是一个简单的HTML页面，包含CSS和JavaScript。</p>
    <button id="myButton">点击我</button>
    <!-- JavaScript部分 -->
    <script>
        document.getElementById('myButton').addEventListener('click', function() {
            alert('按钮被点击了！');
        });
    </script>
    
</body>
</html>
